<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片播放</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        
        .carousel-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .carousel-wrapper {
            display: flex;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }
        
        .carousel-slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
        }
        
        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .carousel-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(255, 255, 255, 0.3);
            border: none;
            color: white;
            font-size: 48px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        
        .carousel-button:hover {
            background-color: rgba(255, 255, 255, 0.5);
        }
        
        .carousel-button.prev {
            left: 20px;
        }
        
        .carousel-button.next {
            right: 20px;
        }
        
        .carousel-dots {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
        }
        
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
        }
        
        .dot.active {
            background-color: rgba(255, 255, 255, 0.9);
            transform: scale(1.2);
        }
        
        .dot:hover {
            background-color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>
    <div class="carousel-container">
        <div class="carousel-wrapper" id="carouselWrapper">
            <div class="carousel-slide">
                <img src="images/圣光科技风半人像.png" alt="图片1">
            </div>
            <div class="carousel-slide">
                <img src="images/圣光科技风背景.jpg" alt="图片2">
            </div>
            <div class="carousel-slide">
                <img src="images/学情诊断可视化报告.png" alt="图片3">
            </div>
            <div class="carousel-slide">
                <img src="images/密盾智学-学生.png" alt="图片4">
            </div>
            <div class="carousel-slide">
                <img src="images/密盾智学-教师.jpg" alt="图片5">
            </div>
            <div class="carousel-slide">
                <img src="images/暗黑科技风半人像.jpg" alt="图片6">
            </div>
            <div class="carousel-slide">
                <img src="images/暗黑科技风背景.jpg" alt="图片7">
            </div>
        </div>
        
        <button class="carousel-button prev" onclick="prevSlide()">‹</button>
        <button class="carousel-button next" onclick="nextSlide()">›</button>
        
        <div class="carousel-dots" id="carouselDots"></div>
    </div>
    
    <script>
        const wrapper = document.getElementById('carouselWrapper');
        const dotsContainer = document.getElementById('carouselDots');
        const slides = document.querySelectorAll('.carousel-slide');
        const totalSlides = slides.length;
        let currentIndex = 0;
        let autoPlayInterval;
        
        function createDots() {
            for (let i = 0; i < totalSlides; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => goToSlide(i);
                dotsContainer.appendChild(dot);
            }
        }
        
        function updateDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentIndex);
            });
        }
        
        function goToSlide(index) {
            currentIndex = index;
            wrapper.style.transform = `translateX(-${currentIndex * 100}%)`;
            updateDots();
        }
        
        function nextSlide() {
            currentIndex = (currentIndex + 1) % totalSlides;
            goToSlide(currentIndex);
        }
        
        function prevSlide() {
            currentIndex = (currentIndex - 1 + totalSlides) % totalSlides;
            goToSlide(currentIndex);
        }
        
        function startAutoPlay() {
            autoPlayInterval = setInterval(nextSlide, 3000);
        }
        
        function stopAutoPlay() {
            clearInterval(autoPlayInterval);
        }
        
        createDots();
        startAutoPlay();
        
        document.querySelector('.carousel-container').addEventListener('mouseenter', stopAutoPlay);
        document.querySelector('.carousel-container').addEventListener('mouseleave', startAutoPlay);
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') prevSlide();
            if (e.key === 'ArrowRight') nextSlide();
        });
    </script>
</body>
</html>
