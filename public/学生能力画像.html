<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>学习能力画像 - 终极完整版</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-liquidfill@3.1.0/dist/echarts-liquidfill.min.js"></script>
    <style>
        :root {
            --main-color: #1D4ED8; 
            --warn-color: #B91C1C;
            --high-color: #B45309;
            --text-title: #020617; 
            --text-norm: #0F172A;  
            --text-sub: #334155;   
            
            --mod-bg: rgba(255, 255, 255, 0.85); 
            --mod-border: rgba(203, 213, 225, 0.8);
            --mod-shadow: 0 8px 32px 0 rgba(15, 23, 42, 0.08), inset 0 1px 1px rgba(255, 255, 255, 0.9);
            --mod-radius: 14px;
            
            --ai-bg: rgba(219, 234, 254, 0.85); 
            --ai-border: rgba(191, 219, 254, 0.9);

            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-size: 18px; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100vw; height: 100vh;
            background-color: #F1F5F9;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, rgba(226, 232, 240, 0.5) 0%, rgba(203, 213, 225, 0.5) 100%), url('./background.png') center/cover no-repeat;
        }

        #app {
            width: 100vw; height: 100vh;
            padding: 12px; 
            display: flex; justify-content: space-between; align-items: stretch;
            gap: 16px; position: relative;
        }

        #app::before {
            content: ''; position: absolute; inset: 0; z-index: 0;
            background-image: linear-gradient(rgba(148, 163, 184, 0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(148, 163, 184, 0.06) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none;
        }

        .human-watermark {
            position: absolute; left: 50%; top: 65%;
            transform: translate(-50%, -50%); width: 550px; height: 700px;
            background: url('./human.png') no-repeat center/contain;
            opacity: 0.7; z-index: 1; pointer-events: none;
        }

        .particles { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        .particle {
            position: absolute; width: 2px; height: 2px;
            background: var(--main-color); border-radius: 50%; opacity: 0;
            box-shadow: 0 0 6px var(--main-color); animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 0.15; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .layout-side { width: 28%; display: flex; flex-wrap: wrap; align-content: flex-start; gap: 12px; z-index: 10; }
        .layout-center { width: 42%; display: flex; flex-direction: column; gap: 12px; z-index: 10; }

        .panel {
            background: var(--mod-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--mod-border); border-radius: var(--mod-radius); box-shadow: var(--mod-shadow);
            padding: 10px; display: flex; flex-direction: column; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .panel:hover {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 12px 40px 0 rgba(15, 23, 42, 0.1), inset 0 1px 1px rgba(255, 255, 255, 1);
            transform: translateY(-1px);
        }

        .panel-half { width: calc((100% - 12px) / 2); height: calc((100% - 12px) / 2); }
        .panel-full { width: 100%; height: calc((100% - 12px) / 2); }
        .panel-horizontal { width: 100%; height: calc((100% - 24px) / 3); padding: 5px 6px; }
        .panel-mini { width: calc((100% - 12px) / 2); height: calc((100% - 24px) / 3); padding: 5px 6px; }

        .panel-title {
            font-size: 19px; font-weight: 700; color: var(--text-title);
            margin-bottom: 8px; display: flex; align-items: center; gap: 8px; letter-spacing: 0.5px;
        }
        .panel-mini .panel-title, .panel-horizontal .panel-title {
            font-size: 18px; margin-bottom: 2px; font-weight: 700;
        }
        .panel-title::before {
            content: ''; width: 4px; height: 16px; background: linear-gradient(180deg, #3B82F6 0%, #1D4ED8 100%);
            border-radius: 2px; box-shadow: 0 1px 3px rgba(29, 78, 216, 0.4);
        }

        .chart-box { flex: 1; width: 100%; min-height: 0; position: relative; }

        .center-header {
            display: flex; justify-content: center; align-items: center; text-align: center;
            padding: 6px 0; background: linear-gradient(180deg, rgba(255,255,255,0.7) 0%, rgba(241,245,249,0.5) 100%);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--mod-border); border-radius: var(--mod-radius); box-shadow: var(--mod-shadow); height: 58px;
        }
        .center-header h1 { font-size: 30px; color: var(--text-title); font-weight: 800; letter-spacing: 5px; text-shadow: 0 2px 4px rgba(255, 255, 255, 1); }

        .center-info {
            background: var(--mod-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--mod-border); border-radius: var(--mod-radius); box-shadow: var(--mod-shadow);
            padding: 5px 4px; display: flex; justify-content: space-around; align-items: center; height: 72px;
        }
        .info-item { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 60px; }
        .info-label { font-size: 16px; font-weight: 600; color: var(--text-sub); letter-spacing: 0.5px; }
        .info-val { font-size: 24px; font-weight: 800; color: var(--text-title); white-space: nowrap; }
        .info-val.s-rank {
            font-size: 48px; font-weight: 900; background: linear-gradient(135deg, #1D4ED8, #1E3A8A);
            -webkit-background-clip: text; color: transparent; line-height: 1; text-shadow: 0 4px 12px rgba(29, 78, 216, 0.3);
        }

        .center-radar-container { flex: 1; position: relative; width: 100%; min-height: 0; cursor: pointer; }
        #main-radar { position: absolute; inset: 0; width: 100%; height: 100%; }

        .center-ai {
            flex: none;
            background: var(--ai-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--ai-border);
            border-radius: var(--mod-radius);
            box-shadow: var(--mod-shadow);
            padding: 4px 6px; 
            min-height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 10;
        }
       .ai-title {
            font-size: 20px;
            font-weight: 600;
            color: #D97706;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
            letter-spacing: 0.5px;
        }
        .ai-title::before {
            content: '✦';
            font-size: 20px;
        }
        .ai-text {
            font-size: 18px;
            color: #000000;
            line-height: 1.6;
            letter-spacing: 0.3px;
        }
        .ai-text span.strength {
            color: #10B981;
            font-weight: bold;
            background: rgba(16, 185, 129, 0.15);
            padding: 0 4px;
            border-radius: 4px;
        }
        .ai-text span.weakness {
            color: #EF4444;
            font-weight: bold;
            background: rgba(239, 68, 68, 0.15);
            padding: 0 4px;
            border-radius: 4px;
        }
        /* ========== 交互弹窗 ========== */
        .l2-floating-container {
            position: fixed; z-index: 1000; 
            width: 480px; height: 480px; 
            background: transparent; pointer-events: none;
            
            opacity: 0; transform: translate(-50%, -50%) scale(0.2); 
            transition: opacity 0.3s ease, transform 0.3s ease;
            cursor: grab; 
        }
        
        @keyframes elasticPop {
            0%   { transform: translate(-50%, -50%) scale(0.2); opacity: 0; }
            40%  { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
            65%  { transform: translate(-50%, -50%) scale(0.92); opacity: 1; }
            85%  { transform: translate(-50%, -50%) scale(1.03); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .l2-floating-container.active { 
            opacity: 1; 
            transform: translate(-50%, -50%) scale(1);
            animation: elasticPop 0.65s cubic-bezier(0.28, 0.84, 0.42, 1) forwards; 
            pointer-events: auto; 
        }
        
        .l2-chart-floating { width: 100%; height: 100%; }
        
        .l2-close-btn {
            position: absolute; top: 32px; right: 32px; width: 32px; height: 32px; background: rgba(15, 23, 42, 0.1); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: #334155; font-size: 22px; font-weight: bold; cursor: pointer; z-index: 10; transition: all 0.2s;
        }
        .l2-close-btn:hover { background: rgba(220, 38, 38, 0.2); color: #B91C1C; transform: scale(1.1); }

        #l3-tooltip {
            position: fixed; z-index: 1010; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 2px solid var(--mod-border); box-shadow: var(--mod-shadow); border-radius: var(--mod-radius); color: var(--text-norm);
            padding: 7px 10px; font-size: 16px; pointer-events: none; opacity: 0; transform: scale(0.9); transition: opacity 0.2s ease, transform 0.2s ease; white-space: nowrap;
        }
        #l3-tooltip.show { opacity: 1; transform: scale(1); }
        .tooltip-title { font-size: 18px; font-weight: 800; color: var(--text-title); border-bottom: 2px solid var(--mod-border); padding-bottom: 6px; margin-bottom: 8px; letter-spacing: 0.5px; }
        .tooltip-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; line-height: 1.4; gap: 20px; }
        .row-label { color: var(--text-sub); font-weight: 600; }
        .row-value { color: var(--main-color); font-weight: 800; font-family: 'Inter', monospace; font-size: 16px; }

        .fade-in { animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="app" class="fade-in">
        <div class="human-watermark"></div>
        <div class="particles" id="particles-box"></div>

        <aside class="layout-side">
            <div class="panel panel-full"><div class="panel-title">知识掌握演进</div><div id="c-l1" class="chart-box"></div></div>
            <div class="panel panel-full"><div class="panel-title">履约与攻坚能力评估</div><div id="c-l3" class="chart-box"></div></div>
        </aside>

        <main class="layout-center">
            <header class="center-header">
                <h1>学习能力画像</h1>
            </header>
            <section class="center-info">
                <div class="info-item"><span class="info-label">姓名</span><span class="info-val">张三丰</span></div>
                <div class="info-item"><span class="info-label">学号</span><span class="info-val" style="font-size:18px; color:#334155; font-weight:700;">EDU-20260320</span></div>
                <div class="info-item"><span class="info-label">综合评级</span><span class="info-val s-rank">S</span></div>
                <div class="info-item"><span class="info-label">学习专注度</span><span class="info-val">92%</span></div>
            </section>
            
            <section class="center-radar-container">
                <div id="main-radar"></div>
            </section>
            
            <section class="center-ai">
                <div class="ai-title">AI 综合洞察</div>
                <div class="ai-text">
                    该生在<span class="strength">知识建构</span>与<span class="strength">自主学习</span>方面表现优异，综合素养处于核心水平。但近期在 <span class="weakness">复杂问题攻坚</span> 及 <span class="weakness">实践操作验证</span> 方面表现薄弱，且批判性思维发散度不足，建议加强进阶题型与实践探究的专项突破。
                </div>
            </section>
        </main>

        <aside class="layout-side">
            <div class="panel panel-horizontal"><div class="panel-title">限时抗压效能趋势</div><div id="c-r-top1" class="chart-box"></div></div>
            <div class="panel panel-horizontal"><div class="panel-title">学科关键能力评估</div><div id="c-r-top2" class="chart-box"></div></div>
            
            <div class="panel panel-mini"><div class="panel-title">时间规划性</div><div id="c-r1" class="chart-box"></div></div>
            <div class="panel panel-mini"><div class="panel-title">学习拓展度</div><div id="c-r2" class="chart-box"></div></div>
        </aside>
    </div>

    <div id="l3-tooltip">
        <div id="l3-content"></div>
    </div>

    <script>
        const particleBox = document.getElementById('particles-box');
        for(let i=0; i<20; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%'; p.style.top = Math.random() * 100 + '%';
            p.style.animationDuration = (Math.random() * 4 + 2) + 's'; p.style.animationDelay = (Math.random() * 2) + 's';
            particleBox.appendChild(p);
        }

        window.addEventListener('load', function() {

            const axisColor = 'rgba(71, 85, 105, 0.5)';
            const splitColor = 'rgba(71, 85, 105, 0.2)';
            const textColor = '#0F172A'; 

            const commonAxis = {
                axisLabel: { color: textColor, fontSize: 17, margin: 10, fontWeight: 600 }, 
                axisLine: { lineStyle: { color: axisColor, width: 2 } },
                splitLine: { show: false }
            };

            const charts = {
                l1: echarts.init(document.getElementById('c-l1')),
                l3: echarts.init(document.getElementById('c-l3')),
                // 注意：这里移除了 l4 的初始化
                rTop1: echarts.init(document.getElementById('c-r-top1')),
                rTop2: echarts.init(document.getElementById('c-r-top2')),
                r1: echarts.init(document.getElementById('c-r1')),
                r2: echarts.init(document.getElementById('c-r2')),
                mainRadar: echarts.init(document.getElementById('main-radar'))
            };

            // l1 保持原有折行设计和班级平均线
            charts.l1.setOption({
                tooltip: { trigger: 'axis' },
                legend: { 
                    data: ['知识内化率', '知识长效巩固度', '知识迁移应用度', '班级平均线'], 
                    textStyle: { color: textColor, fontSize: 17, fontWeight: 600 }, 
                    top: 0, right: 0, icon: 'circle', itemWidth: 8, itemGap: 10,
                    width: 260 
                },
                grid: { top: 50, bottom: 25, left: 45, right: 35 }, 
                xAxis: { 
                    type: 'category', name: '', 
                    data: ['课次1', '课次2', '课次3', '课次4', '课次5', '课次6', '课次7'], 
                    ...commonAxis, nameTextStyle: {color: textColor, fontSize: 18, fontWeight: 700} 
                }, 
                yAxis: { 
                    type: 'value', name: '得分(%)', min: 60, max: 100, 
                    ...commonAxis, nameTextStyle: {color: textColor, fontSize: 18, fontWeight: 700}, splitLine: { show: true, lineStyle: { color: splitColor, width: 1 } } 
                },
                series: [
                    { name: '知识内化率', type: 'line', smooth: true, symbol: 'circle', symbolSize: 8, lineStyle: { width: 3, color: '#2563EB' }, itemStyle: { color: '#2563EB' }, data: [75, 78, 85, 82, 88, 90, 92] },
                    { name: '知识长效巩固度', type: 'line', smooth: true, symbol: 'circle', symbolSize: 8, lineStyle: { width: 3, color: '#059669' }, itemStyle: { color: '#059669' }, data: [70, 65, 70, 75, 72, 80, 85] },
                    { name: '知识迁移应用度', type: 'line', smooth: true, symbol: 'circle', symbolSize: 8, lineStyle: { width: 3, color: '#D97706' }, itemStyle: { color: '#D97706' }, data: [65, 77, 62, 62, 68, 75, 78] },
                    { name: '班级平均线', type: 'line', smooth: true, symbol: 'none', lineStyle: { width: 3, color: '#64748B', type: 'dashed' }, itemStyle: { color: '#64748B' }, data: [68, 77, 75, 74, 78, 82, 88] }
                ]
            });

            // l3 修改：将原 l3 和 l4 数据合并，并增加虚线形式的班级平均线
            charts.l3.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                legend: { data: ['个人表现', '班级平均'], textStyle: { color: textColor, fontSize: 17, fontWeight: 600 }, top: 0, right: 0 },
                grid: { top: 35, bottom: 45, left: 45, right: 20 },
                xAxis: { 
                    type: 'category', 
                    data: ['探究履约', '任务准点', '纪律遵从', '纠错执行', '概念解析', '逻辑重构', '复杂攻坚'], 
                    ...commonAxis, 
                    axisLabel: { margin: 10, color: textColor, fontSize: 17, fontWeight: 700, interval: 0, width: 45, overflow: 'break' } 
                },
                yAxis: { type: 'value', name: '比率(%)', min:60,max: 100, ...commonAxis, nameTextStyle: {color: textColor, fontSize: 18, fontWeight: 700}, splitLine: { show: true, lineStyle: { color: splitColor, width: 1 } } },
                series: [
                    { 
                        name: '个人表现',
                        type: 'bar', barWidth: 14, 
                        itemStyle: { borderRadius: [6, 6, 0, 0], color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{offset: 0, color: '#7C3AED'}, {offset: 1, color: '#DB2777'}]) },
                        label: { show: true, position: 'top', formatter: '{c}%', fontSize: 16, fontWeight: 700, color: textColor },
                        data: [95, 88, 98, 82, 92, 76, 65] 
                    },
                    {
                        name: '班级平均',
                        type: 'line', symbol: 'none',
                        lineStyle: { color: '#94A3B8', width: 2, type: 'dashed' },
                        data: [85, 80, 90, 75, 85, 70, 68]
                    }
                ]
            });

            // rTop1 修改：增加虚线形式的班级平均线，略微下调 grid 以容纳图例
            charts.rTop1.setOption({
                tooltip: { trigger: 'axis' },
                legend: { data: ['个人效能', '班级平均'], textStyle: { color: textColor, fontSize: 17, fontWeight: 600 }, top: 0, right: 0 },
                grid: { top: 35, bottom: 30, left: 35, right: 15 },
                xAxis: { 
                    type: 'category', 
                    data: ['测验1', '测验2', '测验3', '测验4', '测验5', '测验6'], 
                    ...commonAxis, axisLabel: { margin: 10, color: textColor, fontSize: 18, fontWeight: 600 } 
                },
                yAxis: { type: 'value', min: 0.5, max: 1.0, ...commonAxis, axisLabel: { margin: 10, color: textColor, fontSize: 17, fontWeight: 600 }, splitLine: { show: true, lineStyle: { color: splitColor, width: 1 } } },
                series: [
                    {
                        name: '个人效能',
                        type: 'line', smooth: true, symbol: 'circle', symbolSize: 8,
                        lineStyle: { width: 3, color: '#059669' }, itemStyle: { color: '#059669' },
                        areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{offset: 0, color: 'rgba(5, 150, 105, 0.4)'}, {offset: 1, color: 'transparent'}]) },
                        data: [0.65, 0.72, 0.68, 0.75, 0.82, 0.88],
                        label: { show: true, position: 'top', formatter: '{c}', fontSize: 18, color: '#059669', fontWeight: 800 }
                    },
                    {
                        name: '班级平均',
                        type: 'line', smooth: true, symbol: 'none',
                        lineStyle: { width: 2, color: '#94A3B8', type: 'dashed' },
                        data: [0.60, 0.65, 0.63, 0.68, 0.70, 0.75]
                    }
                ]
            });

            // rTop2 修改：增加柱状图形式的班级平均，略微下调 grid 以容纳图例
            charts.rTop2.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                legend: { data: ['个人得分', '班级平均'], textStyle: { color: textColor, fontSize: 17, fontWeight: 600 }, top: 0, right: 0 },
                grid: { top: 35, bottom: 30, left: 40, right: 15 },
                xAxis: { 
                    type: 'category', 
                    data: ['信息提取', '逻辑推理', '实践操作'], 
                    ...commonAxis, axisLabel: { margin: 10, color: textColor, fontSize: 17, fontWeight: 700, interval: 0 } 
                },
                yAxis: { type: 'value', max: 100, ...commonAxis, axisLabel: { margin: 10, color: textColor, fontSize: 17, fontWeight: 600 }, splitLine: { show: true, lineStyle: { color: splitColor, width: 1 } } },
                series: [
                    {
                        name: '个人得分',
                        type: 'bar', barWidth: 14,
                        itemStyle: { borderRadius: [4, 4, 0, 0], color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{offset: 0, color: '#D97706'}, {offset: 1, color: '#FBBF24'}]) },
                        label: { show: true, position: 'top', formatter: '{c}', fontSize: 17, color: '#D97706', fontWeight: 800 },
                        data: [85, 78, 65]
                    },
                    {
                        name: '班级平均',
                        type: 'bar', barWidth: 14,
                        itemStyle: { borderRadius: [4, 4, 0, 0], color: '#CBD5E1' }, // 灰色柱状图
                        label: { show: true, position: 'top', formatter: '{c}', fontSize: 16, color: '#64748B', fontWeight: 700 },
                        data: [70, 65, 55]
                    }
                ]
            });

            charts.r1.setOption({
                title: {  left: 'center', bottom: '0', textStyle: { fontSize: 18, color: '#64748B', fontWeight: 600 } },
                series: [{
                    type: 'liquidFill', data: [0.85, 0.83], radius: '70%', center: ['50%', '42%'],
                    color: ['#2563EB', 'rgba(37, 99, 235, 0.6)'], backgroundStyle: { color: 'rgba(37, 99, 235, 0.1)' },
                    outline: { borderDistance: 3, itemStyle: { borderWidth: 3, borderColor: '#2563EB' } },
                    label: { fontSize: 34, color: '#020617', fontWeight: 900, formatter: function() { return '85%'; } }
                }]
            });


            charts.r2.setOption({
                title: [
                    { text: '62%', left: 'center', top: '32%', textStyle: { fontSize: 30, fontWeight: 900, color: '#7C3AED' } },
                    {  left: 'center', bottom: '0', textStyle: { fontSize: 18, color: '#64748B', fontWeight: 600 } }
                ],
                series: [{
                    type: 'pie', radius: ['55%', '70%'], center: ['50%', '42%'], hoverAnimation: false, label: { show: false },
                    data: [
                        { value: 62, itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 1, 1, [{offset: 0, color: '#2563EB'}, {offset: 1, color: '#7C3AED'}]) } },
                        { value: 38, itemStyle: { color: 'rgba(100, 116, 139, 0.2)' } }
                    ]
                }]
            });


            // ========== 雷达图数据与逻辑（全面按照提供的数据字典更新） ==========
            const dataTree = {
                "学习习惯": { 
                    value: 88, 
                    sub: { 
                        "课前探究": { value: 85, l3: [ { n: "探究履约率", v: "95%" }, { n: "时间规划性", v: "85%" }, { n: "探究深度", v: "高" } ] }, 
                        "课堂交互": { value: 92, l3: [ { n: "纪律遵从度", v: "98%" }, { n: "课堂活跃度", v: "良" }, { n: "交互贡献度", v: "80%" } ] }, 
                        "课后拓展": { value: 82, l3: [ { n: "任务准点率", v: "88%" }, { n: "纠错执行率", v: "82%" }, { n: "学习拓展度", v: "62%" } ] } 
                    } 
                },
                "AI素养": { 
                    value: 92, 
                    sub: { 
                        "知识掌握": { value: 88, l3: [ { n: "知识内化率", v: "92%" }, { n: "知识长效巩固度", v: "85%" }, { n: "知识迁移应用度", v: "78%" } ] }, 
                        "题型攻坚": { value: 85, l3: [ { n: "基础概念解析率", v: "92%" }, { n: "逻辑表达与重构率", v: "76%" }, { n: "复杂问题攻坚率", v: "45%" } ] }, 
                        "学科能力": { value: 90, l3: [ { n: "多模态信息提取力", v: "40%" }, { n: "科学逻辑推理力", v: "35%" }, { n: "实践操作验证力", v: "25%" } ] } 
                    } 
                },
                "科学思维": { 
                    value: 75, 
                    sub: { 
                        "思维敏捷": { value: 80, l3: [ { n: "信息处理响应度", v: "较快" }, { n: "限时抗压效能", v: "78%" } ] }, 
                        "批判发散": { value: 72, l3: [ { n: "批判质疑探究度", v: "中" }, { n: "多向思维发散度", v: "良" } ] }, 
                        "自我认知": { value: 75, l3: [ { n: "自我认知校准度", v: "85%" }, { n: "深度归因复盘率", v: "65%" } ] } 
                    } 
                },
                "调控能力": { 
                    value: 85, 
                    sub: { 
                        "时间规划": { value: 88, l3: [{ n: "任务节奏适配度", v: "0.9" }, { n: "全局效能把控度", v: "优" }] }, 
                        "测评应对": { value: 82, l3: [{ n: "风险规避调控率", v: "80%" }, { n: "审慎核验校验率", v: "85%" }] }, 
                        "绩效抗压": { value: 80, l3: [{ n: "绩效表现波动率", v: "0.08" }, { n: "操作细节严谨度", v: "良" }] }, 
                        "学术自律": { value: 95, l3: [{ n: "测评规则遵从度", v: "100%" }, { n: "学术原创自律度", v: "98%" }] } 
                    } 
                },
                "社会协同": { 
                    value: 90, 
                    sub: { 
                        "个性潜能": { value: 92, l3: [{ n: "个性化优势区", v: "物理/逻辑" }, { n: "待唤醒提升区", v: "英语/发散" }] }, 
                        "发展增值": { value: 88, l3: [{ n: "自我超越增值度", v: "18%" }, { n: "群体竞争位移度", v: "前15%" }] }, 
                        "团队协同": { value: 90, l3: [{ n: "团队协同贡献比", v: "30%" }, { n: "朋辈互助辐射度", v: "极高" }] } 
                    } 
                }
            };

            const l1Indicators = Object.keys(dataTree).map(k => ({ name: k, max: 100 }));
            const l1Values = Object.values(dataTree).map(v => v.value);
            
            const activeL2Charts = {};
            const domL3Tooltip = document.getElementById('l3-tooltip');
            const domL3Content = document.getElementById('l3-content');

            function formatRadarName(value) {
                return value;
            }

            function updateMainRadarLabels() {
                charts.mainRadar.setOption({
                    radar: {
                        axisName: {
                            formatter: function (value) {
                                return activeL2Charts[value] ? '{h|}' : '{n|' + formatRadarName(value) + '}';
                            }
                        }
                    }
                });
            }

            charts.mainRadar.setOption({
                radar: {
                    indicator: l1Indicators,
                    startAngle: 90,     
                    clockwise: false,  
                    radius: '40%', 
                    center: ['50%', '50%'],
                    splitNumber: 3,
                    nameGap: 16, 
                    axisName: {
                        formatter: function (value) { return '{n|' + formatRadarName(value) + '}'; },
                        rich: {
                            n: { 
                                color: '#ffffff', backgroundColor: 'rgba(29, 78, 216, 0.95)', 
                                borderRadius: 6, fontSize: 22, fontWeight: '700', padding: [6, 10], lineHeight: 20,
                                textShadowBlur: 4, textShadowColor: 'rgba(0,0,0,0.4)', align: 'center', cursor: 'pointer'
                            },
                            h: { color: 'transparent', backgroundColor: 'transparent', padding: 0, fontSize: 10, lineHeight: 0 }
                        }
                    },
                    splitLine: { lineStyle: { color: 'rgba(51, 65, 85, 0.4)', width: 1.5 } }, 
                    splitArea: { show: true, areaStyle: { color: ['rgba(203, 213, 225, 0.6)', 'rgba(226, 232, 240, 0.6)'] } }, 
                    axisLine: { lineStyle: { color: 'rgba(51, 65, 85, 0.4)', width: 1.5 } }
                },
                series: [{
                    type: 'radar',
                    data: [{ 
                        value: l1Values, 
                        name: '当前学生',
                        label: {
                            show: true,
                            formatter: function(params) { return (params.value / 100).toFixed(2); }, 
                            color: '#1D4ED8', fontSize: 20, fontWeight: '900', distance: 6,padding:-12
                        }
                    }],
                    itemStyle: { color: '#1D4ED8' },
                    areaStyle: { color: 'rgba(29, 78, 216, 0.3)' }, 
                    lineStyle: { color: '#1D4ED8', width: 2 },
                    symbol: 'circle', symbolSize: 8,
                    emphasis: { itemStyle: { shadowBlur: 8, shadowColor: '#1D4ED8' }, lineStyle: { width: 3 } }
                }]
            });

            const colorPalette = [
                { main: '#1D4ED8', bg: 'rgba(29, 78, 216, 0.95)', area: 'rgba(29, 78, 216, 0.35)', line: 'rgba(29, 78, 216, 0.5)' }, 
                { main: '#047857', bg: 'rgba(4, 120, 87, 0.95)',  area: 'rgba(4, 120, 87, 0.35)',  line: 'rgba(4, 120, 87, 0.5)' }, 
                { main: '#B45309', bg: 'rgba(180, 83, 9, 0.95)',  area: 'rgba(180, 83, 9, 0.35)',  line: 'rgba(180, 83, 9, 0.5)' }, 
                { main: '#BE185D', bg: 'rgba(190, 24, 93, 0.95)', area: 'rgba(190, 24, 93, 0.35)', line: 'rgba(190, 24, 93, 0.5)' }, 
                { main: '#6D28D9', bg: 'rgba(109, 40, 217, 0.95)', area: 'rgba(109, 40, 217, 0.35)', line: 'rgba(109, 40, 217, 0.5)' }, 
                { main: '#B91C1C', bg: 'rgba(185, 28, 28, 0.95)',  area: 'rgba(185, 28, 28, 0.35)',  line: 'rgba(185, 28, 28, 0.5)' }  
            ];

            function getNextAvailableColor() {
                const usedIndexes = Object.values(activeL2Charts).map(item => item.colorIndex);
                for (let i = 0; i < colorPalette.length; i++) {
                    if (!usedIndexes.includes(i)) return { index: i, scheme: colorPalette[i] };
                }
                const fallbackIndex = Object.keys(activeL2Charts).length % colorPalette.length;
                return { index: fallbackIndex, scheme: colorPalette[fallbackIndex] };
            }

            function closeL2Chart(l1Name) {
                if (activeL2Charts[l1Name]) {
                    const { container, chartInstance } = activeL2Charts[l1Name];
                    container.classList.remove('active');
                    hideL3Tooltip();
                    delete activeL2Charts[l1Name]; 
                    updateMainRadarLabels(); 
                    setTimeout(() => {
                        chartInstance.dispose();
                        container.remove();
                    }, 650); 
                }
            }

            function triggerPopup(l1Name, originalEvent) {
                if (!l1Name || !dataTree[l1Name]) return;
                if (activeL2Charts[l1Name]) return;

                const { index: colorIndex, scheme: colorScheme } = getNextAvailableColor();
                const container = document.createElement('div');
                container.className = 'l2-floating-container';
                
                let popX = originalEvent.clientX;
                let popY = originalEvent.clientY;
                const halfW = 240; 
                if (popX < halfW) popX = halfW + 16;
                if (popX > window.innerWidth - halfW) popX = window.innerWidth - halfW - 16;
                if (popY < halfW) popY = halfW + 16;
                if (popY > window.innerHeight - halfW) popY = window.innerHeight - halfW - 16;

                container.style.left = popX + 'px';
                container.style.top = popY + 'px';

                const closeBtn = document.createElement('div');
                closeBtn.className = 'l2-close-btn';
                closeBtn.innerHTML = '×';
                closeBtn.onclick = function(evt) {
                    evt.stopPropagation(); 
                    closeL2Chart(l1Name);
                };
                container.appendChild(closeBtn);

                const chartDiv = document.createElement('div');
                chartDiv.className = 'l2-chart-floating';
                container.appendChild(chartDiv);
                
                document.body.appendChild(container);

                const chartInstance = echarts.init(chartDiv);
                activeL2Charts[l1Name] = { container, chartInstance, colorIndex };
                
                updateMainRadarLabels(); 

                setTimeout(() => {
                    container.classList.add('active'); 
                    bindL3Tooltip(chartInstance, l1Name, container);
                    renderLevel2Chart(chartInstance, l1Name, colorScheme);
                }, 30);
            }

            charts.mainRadar.getZr().on('click', function(e) {
                const zr = charts.mainRadar.getZr();
                const w = zr.getWidth();
                const h = zr.getHeight();
                const cx = w / 2;
                const cy = h / 2;
                const dx = e.offsetX - cx;
                const dy = e.offsetY - cy;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 20) return; 
                
                let angle = Math.atan2(dy, dx) * 180 / Math.PI;
                if (angle < 0) angle += 360;
                
                const targets = [270, 198, 126, 54, 342]; 
                let minDiff = 360;
                let closestIndex = -1;
                
                for (let i = 0; i < targets.length; i++) {
                    let diff = Math.abs(angle - targets[i]);
                    if (diff > 180) diff = 360 - diff;
                    if (diff < minDiff) {
                        minDiff = diff;
                        closestIndex = i;
                    }
                }
                
                if (closestIndex !== -1) {
                    const l1Name = l1Indicators[closestIndex].name;
                    triggerPopup(l1Name, e.event); 
                }
            });

            let activeDragCtx = null;
            document.addEventListener('mousedown', function(e) {
                const container = e.target.closest('.l2-floating-container');
                if (container && !e.target.closest('.l2-close-btn')) {
                    activeDragCtx = { container: container, startX: e.clientX, startY: e.clientY, initialX: container.offsetLeft, initialY: container.offsetTop };
                    container.style.cursor = 'grabbing'; 
                    container.style.transition = 'none'; 
                    document.querySelectorAll('.l2-floating-container').forEach(el => el.style.zIndex = 1000); 
                    container.style.zIndex = 1005;
                }
            });

            document.addEventListener('mousemove', function(e) {
                if (activeDragCtx) {
                    const dx = e.clientX - activeDragCtx.startX; const dy = e.clientY - activeDragCtx.startY;
                    activeDragCtx.container.style.left = (activeDragCtx.initialX + dx) + 'px'; 
                    activeDragCtx.container.style.top = (activeDragCtx.initialY + dy) + 'px';
                    hideL3Tooltip(); 
                }
            });

            document.addEventListener('mouseup', function() {
                if (activeDragCtx) {
                    activeDragCtx.container.style.cursor = 'grab';
                    activeDragCtx.container.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                    activeDragCtx = null;
                }
            });

            function renderLevel2Chart(chartInstance, l1Name, colorScheme) {
                const subData = dataTree[l1Name].sub;
                const l2Indicators = Object.keys(subData).map(k => ({ name: k, max: 100 }));
                const l2Values = Object.values(subData).map(v => v.value);

                chartInstance.setOption({
                    title: {
                        text: l1Name, left: 'center', top: 'center',
                        textStyle: { color: colorScheme.main, fontSize: 22, fontWeight: '900', textShadowColor: 'rgba(255, 255, 255, 0.9)', textShadowBlur: 6 }
                    },
                    radar: {
                        indicator: l2Indicators, triggerEvent: true, radius: '40%', center: ['50%', '50%'], nameGap: 14,
                        axisName: { 
                            color: '#fff', backgroundColor: colorScheme.bg, borderRadius: 4, padding: [6, 8], 
                            fontSize: 20, fontWeight: '700', cursor: 'pointer', lineHeight: 18,
                            formatter: function (value) {
                                if (value.length > 5) return value.substring(0, 4) + '\n' + value.substring(4);
                                return value;
                            }
                        },
                        splitArea: { show: true, areaStyle: { color: ['rgba(203, 213, 225, 0.4)', 'rgba(226, 232, 240, 0.4)'] } }, 
                        splitLine: { lineStyle: { color: colorScheme.line, width: 1.5 } }, 
                        axisLine: { lineStyle: { color: colorScheme.line, width: 1.5 } }
                    },
                    series: [{
                        type: 'radar',
                        data: [{ 
                            value: l2Values,
                            label: {
                                show: true,
                                formatter: function(params) { return (params.value / 100).toFixed(2); }, 
                                color: colorScheme.main, fontSize: 20, fontWeight: '900', distance: 5,padding:-10
                            }
                        }],
                        itemStyle: { color: colorScheme.main }, areaStyle: { color: colorScheme.area }, lineStyle: { width: 2 }, symbolSize: 6, symbol: 'circle'
                    }]
                });
            }

            function bindL3Tooltip(l2ChartInstance, contextL1Name, container) {
                l2ChartInstance.on('mouseover', function (params) { 
                    if(params.name && params.componentType === 'radar') showL3Tooltip(contextL1Name, params.name, params.event.event, container); 
                });
                l2ChartInstance.on('mouseout', function () { hideL3Tooltip(); });
                l2ChartInstance.on('mousemove', function(params) { 
                    if(params.name && params.componentType === 'radar') updateL3TooltipPos(params.event.event, container); 
                });
                
                l2ChartInstance.on('click', function(params) {
                    if(params.name && params.componentType === 'radar') {
                        showL3Tooltip(contextL1Name, params.name, params.event.event, container);
                        setTimeout(() => hideL3Tooltip(), 3000);
                    }
                });
            }

            function showL3Tooltip(l1Key, l2Name, e, container) {
                const l3DataArray = dataTree[l1Key].sub[l2Name] ? dataTree[l1Key].sub[l2Name].l3 : null;
                if(!l3DataArray) return;
                let htmlStr = `<div class="tooltip-title">${l2Name}</div>`;
                l3DataArray.forEach(item => { htmlStr += `<div class="tooltip-row"><span class="row-label">${item.n}</span><span class="row-value">${item.v}</span></div>`; });
                domL3Content.innerHTML = htmlStr;
                updateL3TooltipPos(e, container); 
                domL3Tooltip.classList.add('show');
            }

            function updateL3TooltipPos(e, container) {
                if (!e) return; 
                const tooltipWidth = domL3Tooltip.offsetWidth || 150; 
                const tooltipHeight = domL3Tooltip.offsetHeight || 70;
                
                let cX = e.clientX;
                let cY = e.clientY;
                if (cX === undefined || cY === undefined) {
                    const rect = container.getBoundingClientRect();
                    cX = rect.left + rect.width / 2;
                    cY = rect.top + rect.height / 2;
                }

                const l2Rect = container.getBoundingClientRect();
                const l2CenterX = l2Rect.left + l2Rect.width / 2; 
                const l2CenterY = l2Rect.top + l2Rect.height / 2;
                
                let left = cX > l2CenterX ? cX + 8 : cX - tooltipWidth - 8;
                let top = cY > l2CenterY ? cY + 8 : cY - tooltipHeight - 8;
                
                left = Math.max(8, Math.min(left, window.innerWidth - tooltipWidth - 8)); 
                top = Math.max(8, Math.min(top, window.innerHeight - tooltipHeight - 8));
                
                domL3Tooltip.style.left = left + 'px'; 
                domL3Tooltip.style.top = top + 'px';
            }

            function hideL3Tooltip() { domL3Tooltip.classList.remove('show'); }

            setTimeout(() => { Object.values(charts).forEach(c => c.resize()); }, 100);
            window.addEventListener('resize', () => {
                Object.values(charts).forEach(c => c.resize());
                Object.values(activeL2Charts).forEach(item => item.chartInstance.resize());
            });

        });
    </script>
